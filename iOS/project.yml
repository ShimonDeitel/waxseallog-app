name: WaxSealLog
options:
  bundleIdPrefix: com.shimondeitel.waxseallog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  WaxSealLog:
    type: application
    platform: iOS
    sources:
      - path: WaxSealLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.waxseallog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WaxSealLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WaxSealLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WaxSealLogTests
      - path: WaxSealLog.storekit
    dependencies:
      - target: WaxSealLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.waxseallog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WaxSealLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WaxSealLogUITests
    dependencies:
      - target: WaxSealLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.waxseallog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  WaxSealLog:
    build:
      targets:
        WaxSealLog: all
        WaxSealLogTests: [test]
        WaxSealLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: WaxSealLog.storekit
    test:
      config: Debug
      storeKitConfiguration: WaxSealLog.storekit
      targets:
        - WaxSealLogTests
        - WaxSealLogUITests
    archive:
      config: Release
