<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Wax Seal Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background:#2A0E14; color:#f5f5f5; font-family: -apple-system, Helvetica, Arial, sans-serif; margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.card { max-width:560px; padding:48px 32px; text-align:center; }
h1 { color:#C9A227; font-size:2.2rem; margin-bottom:8px; }
p { color:#cfcfcf; line-height:1.6; }
.badge { display:inline-block; margin-top:24px; padding:10px 22px; border:1px solid #C9A227; color:#C9A227; border-radius:999px; text-decoration:none; }
footer { margin-top:40px; font-size:0.85rem; color:#888; }
a { color:#C9A227; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #C9A22755 0%, #C9A22700 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head>
<body>
<div class="orb"></div>
<div class="card">
<h1>Wax Seal Log</h1>
<p>Catalog wax seal stamps and impressions collected.</p>
<a class="badge" href="#">Coming soon on the App Store</a>
<footer>
<p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
<p>Contact: s0533495227@gmail.com</p>
</footer>
</div>
</body></html>
